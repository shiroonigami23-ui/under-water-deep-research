name: Sync From Research Vault

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest Research-Vault README
        run: |
          mkdir -p connected
          curl -L "https://raw.githubusercontent.com/shiroonigami23-ui/Research-Vault/main/README.md" -o connected/Research-Vault-README.md

      - name: Commit sync update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add connected/Research-Vault-README.md
          git diff --staged --quiet || git commit -m "Sync-Research-Vault-README"
          git push
